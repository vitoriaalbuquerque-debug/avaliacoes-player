version: "3.9"

# SQLite é o padrão agora (arquivo local, zero configuração) — por isso não
# tem serviço de banco aqui. Quando for migrar pro piloto com Postgres, é só
# descomentar o serviço "db" abaixo, trocar DATABASE_URL no .env, e adicionar
# de volta `depends_on: [db]` no serviço "api".

services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./comer_fora.db:/app/comer_fora.db

